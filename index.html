<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Slot Machine</title>
    <style>
        /* CSS: 見た目の整え */
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            background: #34495e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 5px solid #f1c40f;
        }

        .slot-machine {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .reel {
            width: 80px;
            height: 100px;
            background: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            color: #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            transition: 0.2s;
            box-shadow: 0 5px #c0392b;
        }

        button:active {
            box-shadow: none;
            transform: translateY(5px);
        }

        button:disabled {
            background-color: #7f8c8d;
            box-shadow: none;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            font-size: 24px;
            height: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SLOT GAME</h1>
        <div class="slot-machine">
            <div id="reel1" class="reel">?</div>
            <div id="reel2" class="reel">?</div>
            <div id="reel3" class="reel">?</div>
        </div>
        <button id="spin-btn">SPIN!</button>
        <div id="message"></div>
    </div>

    <script>
        // JavaScript: 動作の制御
        const symbols = ['🍒', '🔔', '💎', '7️⃣', '🍉'];
        const spinBtn = document.getElementById('spin-btn');
        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const message = document.getElementById('message');

        spinBtn.addEventListener('click', () => {
            startSpin();
        });

        async function startSpin() {
            // 初期化
            spinBtn.disabled = true;
            message.textContent = "運試し中...";
            
            const results = [];
            
            // 各リールを順番に止める演出
            for (let i = 0; i < reels.length; i++) {
                results[i] = await animateReel(reels[i], 1000 + (i * 500));
            }

            checkResult(results);
        }

        // リールの回転演出
        function animateReel(reelElement, duration) {
            return new Promise(resolve => {
                const startTime = Date.now();
                
                const timer = setInterval(() => {
                    // ランダムにシンボルを入れ替える
                    const randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                    reelElement.textContent = randomSymbol;

                    // 一定時間経過したら停止
                    if (Date.now() - startTime >= duration) {
                        clearInterval(timer);
                        resolve(randomSymbol);
                    }
                }, 50); // 0.05秒ごとに切り替え
            });
        }

        // 当たり判定
        function checkResult(results) {
            spinBtn.disabled = false;
            
            if (results[0] === results[1] && results[1] === results[2]) {
                message.textContent = "🎉 おめでとう！当たりです！ 🎉";
                message.style.color = "#f1c40f";
            } else {
                message.textContent = "残念！もう一回？";
                message.style.color = "white";
            }
        }
    </script>
</body>
</html>
