<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Slot Game</title>
    <style>
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial;
            color: white;
        }

        .container {
            text-align: center;
            background: #34495e;
            padding: 30px;
            border-radius: 20px;
            border: 5px solid #f1c40f;
        }

        .slot-machine {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }

        .reel {
            width: 80px;
            height: 100px;
            background: white;
            border-radius: 10px;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
        }

        button {
            padding: 15px 40px;
            font-size: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
        }

        #message {
            margin-top: 20px;
            font-size: 22px;
        }

        #credit {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SLOT GAME</h1>
    <div id="credit">クレジット: 100</div>

    <div class="slot-machine">
        <div id="reel1" class="reel">?</div>
        <div id="reel2" class="reel">?</div>
        <div id="reel3" class="reel">?</div>
    </div>

    <button id="spin-btn">SPIN!</button>
    <div id="message"></div>
</div>

<script>
const symbols = [
    '🍉','🍉','🍉','🍉',
    '🍒','🍒','🍒',
    '🔔','🔔',
    '💎',
    '7️⃣'
];

// 配当
const payouts = {
    '🍒': 20,
    '🔔': 30,
    '💎': 50,
    '7️⃣': 100,
    '🍉': 10
};

let credit = 100;

const spinBtn = document.getElementById('spin-btn');
const reels = [
    document.getElementById('reel1'),
    document.getElementById('reel2'),
    document.getElementById('reel3')
];
const message = document.getElementById('message');
const creditDisplay = document.getElementById('credit');

spinBtn.addEventListener('click', startSpin);

async function startSpin() {
    if (credit < 10) {
        message.textContent = "クレジットが足りません！";
        return;
    }

    credit -= 10;
    updateCredit();

    spinBtn.disabled = true;
    message.textContent = "運試し中...";

    const results = [];

    for (let i = 0; i < reels.length; i++) {
        results[i] = await animateReel(reels[i], 1000 + i * 500);
    }

    checkResult(results);
}

function animateReel(reel, duration) {
    return new Promise(resolve => {
        const start = Date.now();

        const timer = setInterval(() => {
            const symbol = symbols[Math.floor(Math.random() * symbols.length)];
            reel.textContent = symbol;

            if (Date.now() - start > duration) {
                clearInterval(timer);
                resolve(symbol);
            }
        }, 50);
    });
}

function checkResult(results) {
    spinBtn.disabled = false;

    if (results[0] === results[1] && results[1] === results[2]) {
        const symbol = results[0];
        const win = payouts[symbol];

        credit += win;

        message.textContent = `🎉 ${symbol}揃い！ +${win} 🎉`;
        message.style.color = "#f1c40f";
    } else {
        message.textContent = "残念！もう一回？ (-10)";
        message.style.color = "white";
    }

    updateCredit();
}

function updateCredit() {
    creditDisplay.textContent = "クレジット: " + credit;
}
</script>

</body>
</html>
